<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitva Parser PRO — автообновление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0a07;
            font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif;
            color: #e8dcc0;
            padding: 30px 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: linear-gradient(145deg, #1a1612, #12100e);
            border-radius: 28px;
            padding: 24px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(199, 186, 0, 0.25);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(199, 186, 0, 0.25);
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
            color: #d4b35a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: rgba(199, 186, 0, 0.12);
            padding: 5px 14px;
            border-radius: 60px;
            font-size: 12px;
            color: #e6c87a;
            border: 1px solid rgba(199, 186, 0, 0.35);
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
            max-height: 380px;
            overflow-y: auto;
            padding: 4px 2px;
        }

        .player-item {
            background: linear-gradient(145deg, #201c18, #18140f);
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2f2a24;
        }

        .player-item:hover {
            border-color: #c7ba00;
            background: #2b2620;
            transform: translateX(4px);
        }

        .player-item input {
            width: 18px;
            height: 18px;
            accent-color: #c7ba00;
            cursor: pointer;
            pointer-events: none;
        }

        .player-name {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 24px;
        }

        .btn {
            background: linear-gradient(145deg, #25201b, #1c1814);
            border: 1px solid rgba(199, 186, 0, 0.35);
            padding: 9px 20px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 500;
            color: #f0e2cf;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: linear-gradient(145deg, #c7ba00, #d4b35a);
            color: #0d0a07;
            border-color: #ffdd99;
        }

        .btn-primary {
            background: linear-gradient(145deg, #c7ba00, #b8a800);
            border-color: #ffdd99;
            color: #0d0a07;
            font-weight: 700;
            font-size: 14px;
            padding: 12px 20px;
            width: 100%;
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-area {
            margin-top: 20px;
        }

        .progress-bar-container {
            background: #2a2622;
            border-radius: 40px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #c7ba00, #ffdd88);
            height: 100%;
            width: 0%;
            transition: width 0.25s;
        }

        .progress-text {
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
            color: #b9aa8a;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 24px;
        }

        .search-box input {
            background: #12100e;
            border: 1px solid rgba(199, 186, 0, 0.4);
            padding: 10px 18px;
            border-radius: 60px;
            color: #f5e8d4;
            width: 270px;
            font-size: 13px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #d4b35a;
        }

        .sort-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .sort-chip {
            background: #1c1814;
            border: 1px solid rgba(199, 186, 0, 0.35);
            border-radius: 60px;
            padding: 6px 18px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.15s;
            color: #e0cfb5;
        }

        .sort-chip:hover {
            border-color: #c7ba00;
            background: #2b2620;
        }

        .sort-chip.active {
            background: #c7ba00;
            color: #0d0a07;
            border-color: #ffdd99;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid rgba(199, 186, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: #0e0c09;
        }

        th {
            text-align: left;
            padding: 14px 12px;
            color: #e6c87a;
            font-weight: 700;
            background: #1a1612;
            border-bottom: 2px solid #c7ba00;
            border-right: 1px solid #2a2622;
        }

        th:last-child {
            border-right: none;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #2a2622;
            border-right: 1px solid #2a2622;
            vertical-align: top;
            background: #0e0c09;
            transition: background 0.3s;
        }

        td:last-child {
            border-right: none;
        }

        tr:hover td {
            background: rgba(199, 186, 0, 0.06);
        }

        /* Анимация подсветки изменений */
        @keyframes highlightFlash {
            0% { background: rgba(122, 201, 110, 0); }
            20% { background: rgba(122, 201, 110, 0.4); }
            100% { background: rgba(122, 201, 110, 0); }
        }

        tr.highlight-change td {
            animation: highlightFlash 1.5s ease-out;
        }

        tr.belt-highlight td {
            background: rgba(212, 96, 58, 0.06);
            border-left: 3px solid #d4603a;
        }

        tr.belt-highlight td:first-child {
            border-left: 3px solid #d4603a;
        }

        tr.belt-highlight:hover td {
            background: rgba(212, 96, 58, 0.12);
        }

        .style-Урон { color: #8bcb6e; font-weight: 600; }
        .style-Броня { color: #e6836b; font-weight: 600; }
        .style-Уворот { color: #6ea8dc; font-weight: 600; }
        .style-Элита { color: #e6c87a; font-weight: 600; }

        .potion-strength { color: #e65c4a; font-weight: 600; }
        .potion-regen { color: #f0da6a; font-weight: 600; }
        .potion-troll { color: #7ac96e; font-weight: 600; }
        .potion-speed { color: #6ea8dc; font-weight: 600; }

        .aura-death {
            color: #d4603a;
            font-weight: 700;
            background: rgba(212, 96, 58, 0.12);
            padding: 2px 10px;
            border-radius: 30px;
            display: inline-block;
            text-shadow: 0 0 4px rgba(212, 96, 58, 0.4);
            box-shadow: 0 0 6px rgba(212, 96, 58, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: #12100e;
            border-radius: 20px;
            padding: 16px;
            border: 1px solid rgba(199, 186, 0, 0.2);
            text-align: center;
        }

        .stat-number {
            font-size: 34px;
            font-weight: 800;
            color: #d4b35a;
        }

        .stat-label {
            font-size: 12px;
            color: #9b8e78;
            margin-top: 6px;
        }

        .stats-detail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-block {
            background: #12100e;
            border-radius: 18px;
            padding: 16px;
            border: 1px solid rgba(199, 186, 0, 0.2);
        }

        .stat-block h4 {
            font-size: 13px;
            color: #d4b35a;
            margin-bottom: 14px;
            border-left: 3px solid #c7ba00;
            padding-left: 10px;
        }

        .stat-list {
            max-height: 270px;
            overflow-y: auto;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 7px 0;
            font-size: 12px;
            border-bottom: 1px dashed #2a2622;
        }

        .stat-count {
            color: #c7ba00;
            background: rgba(199, 186, 0, 0.1);
            padding: 0 8px;
            border-radius: 20px;
        }

        /* автообновление */
        .auto-refresh-panel {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid rgba(199, 186, 0, 0.15);
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .toggle-switch input {
            width: 44px;
            height: 22px;
            appearance: none;
            background: #2a2622;
            border-radius: 22px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(199, 186, 0, 0.3);
        }

        .toggle-switch input:checked {
            background: #7ac96e;
        }

        .toggle-switch input::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #e8dcc0;
            border-radius: 50%;
            top: 1px;
            left: 2px;
            transition: 0.2s;
        }

        .toggle-switch input:checked::before {
            left: 22px;
        }

        .interval-input {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .interval-input input {
            background: #12100e;
            border: 1px solid rgba(199, 186, 0, 0.4);
            padding: 6px 10px;
            border-radius: 30px;
            color: #e8dcc0;
            width: 75px;
            text-align: center;
        }

        .auto-status {
            font-size: 12px;
            color: #7ac96e;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .auto-status .pulse {
            width: 8px;
            height: 8px;
            background: #7ac96e;
            border-radius: 50%;
            animation: pulseGreen 1.5s infinite;
        }

        @keyframes pulseGreen {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 #7ac96e; }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(122, 201, 110, 0.3); }
        }

        .notification-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(30, 25, 20, 0.95);
            backdrop-filter: blur(8px);
            border-left: 3px solid #7ac96e;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1612;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #5a543e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #c7ba00;
        }

        @media (max-width: 800px) {
            body { padding: 16px; }
            .card { padding: 18px; }
            .stats-detail { grid-template-columns: 1fr; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .auto-refresh-panel { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="card-header">
            <h2>🎯 MOBITVA PARSER</h2>
            <div class="badge">⚡ автообновление</div>
        </div>
        <div style="font-size: 13px; color: #aa9f86;">Анализ экипировки · оружие · зелья · аура death</div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>👥 Отряд</h2>
            <div class="badge" id="selectedCountBadge">выбрано: 0</div>
        </div>
        <div class="btn-group">
            <button class="btn" id="selectAllBtn">✅ Выбрать всех</button>
            <button class="btn" id="deselectAllBtn">❌ Снять всех</button>
            <button class="btn" id="saveSelectionBtn">💾 Сохранить выбор</button>
        </div>
        <div id="playersGrid" class="players-grid"></div>
    </div>

    <div class="card">
        <button class="btn btn-primary" id="parseBtn">🚀 ЗАПУСТИТЬ ПАРСИНГ</button>
        <div id="progressArea" style="display: none;" class="progress-area">
            <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
            <div class="progress-text" id="progressText"></div>
        </div>
        
        <div class="auto-refresh-panel">
            <label class="toggle-switch">
                <input type="checkbox" id="autoRefreshToggle">
                <span>🔄 Автообновление</span>
            </label>
            <div class="interval-input">
                <span>⏱ Интервал:</span>
                <input type="number" id="refreshInterval" value="30" min="10" max="300" step="5">
                <span>сек</span>
            </div>
            <div id="autoStatus" class="auto-status" style="display: none;">
                <span class="pulse"></span>
                <span>Следующее обновление через <span id="countdown">--</span> сек</span>
            </div>
        </div>
    </div>

    <div id="resultsArea" style="display: none;">
        <div class="card">
            <div class="card-header">
                <h2>📋 Экипировка</h2>
                <div class="badge" id="resultsCount">0</div>
            </div>
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск: ник, оружие, предмет...">
                </div>
                <div class="sort-buttons">
                    <span class="sort-chip" data-sort="nick">👤 Ник</span>
                    <span class="sort-chip" data-sort="style">🎨 Стиль</span>
                    <span class="sort-chip" data-sort="weapon">⚔️ Оружие</span>
                    <span class="sort-chip" data-sort="aura">💀 Аура death</span>
                </div>
            </div>
            <div class="table-wrapper" id="resultsTable"></div>
        </div>
    </div>

    <div id="statsArea" style="display: none;">
        <div class="card">
            <div class="card-header">
                <h2>📊 Статистика отряда</h2>
                <div class="badge" id="statsDate"></div>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
            <div class="stats-detail" id="statsDetail"></div>
        </div>
    </div>
</div>

<script>
    let playersList = [];
    let isParsing = false;
    let currentResults = [];
    let currentStats = null;
    let currentSort = { field: 'nick', asc: true };
    
    let autoRefreshEnabled = false;
    let autoRefreshTimer = null;
    let countdownInterval = null;

    const DEFAULT_PLAYERS = [
            "Punisher|68",
            "Nesquik|1147",
            "๖𝕭𝖗𝖚𝖙𝖆𝖑࿐|101",
            "iwdys|1158",
            "𝐑𝐞𝐙𝐚𝐐|84",
            "TORPEDA|141",
            "★ṂαтPúЦα★|1157",
            "Comatose|95",
            "URAGAN|1030",
            "CRIT☠ONLY|103",
            "Zаryechka|365",
            "Fallen Angel°|194",
            "𝓐𝓶𝓱𝓪𝓭𝓸𝓿|121",
            "Брдыщ|1254",
            "3меелов|1206",
            "ТАЩУН|1149",
            "𝐂𝐨𝐫𝐩𝐬𝐞𝐁𝐫𝐞𝐚𝐭𝐡|129",
            "The Рunisher|1133",
            "-En1gma-|962",
            "SayGoodbye|1154",
            "𝐴𝑒𝑔𝑖𝑠|111",
            "RED|1128",
            "Samantha|1173",
            "Punіsher|461"
    ];

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function hasAura(belt) { return belt && belt.includes('Аура death'); }

    function showToast(message, isSuccess = true) {
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.style.borderLeftColor = isSuccess ? '#7ac96e' : '#d4603a';
        toast.innerHTML = isSuccess ? `✅ ${message}` : `⚠️ ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function highlightItems(text) {
        if(!text || text === 'пустой') return text;
        let result = escapeHtml(text);
        result = result.replace(/Аура death/g, '<span class="aura-death">Аура death</span>');
        result = result.replace(/Сила гор/g, '<span class="potion-strength">Сила гор</span>');
        result = result.replace(/Сила Регенерации/g, '<span class="potion-regen">Сила Регенерации</span>');
        result = result.replace(/Сила Тролля/g, '<span class="potion-troll">Сила Тролля</span>');
        result = result.replace(/Сила Скорости/g, '<span class="potion-speed">Сила Скорости</span>');
        return result;
    }

    function saveToLocalStorage() {
        localStorage.setItem('mobitva_players', JSON.stringify(playersList.map(p => ({ nick: p.nick, id: p.id, selected: p.selected }))));
    }

    function loadFromLocalStorage() {
        const saved = localStorage.getItem('mobitva_players');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(parsed.length === playersList.length) {
                    for(let i=0;i<playersList.length;i++) playersList[i].selected = parsed[i]?.selected ?? true;
                    renderPlayersGrid();
                    return true;
                }
            } catch(e) {}
        }
        return false;
    }

    function initDefaultPlayers() {
        playersList = DEFAULT_PLAYERS.map(line => {
            const [nick, id] = line.split('|');
            return { nick: nick.trim(), id: parseInt(id.trim()), selected: true };
        });
        renderPlayersGrid();
    }

    function renderPlayersGrid() {
        const container = document.getElementById('playersGrid');
        let html = '';
        playersList.forEach((p,i) => {
            html += `<div class="player-item" data-index="${i}">
                        <input type="checkbox" class="player-checkbox" ${p.selected ? 'checked' : ''}>
                        <span class="player-name">${escapeHtml(p.nick)}</span>
                    </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.player-item').forEach(div => {
            div.addEventListener('click', (e) => {
                if(e.target.tagName === 'INPUT') return;
                const cb = div.querySelector('.player-checkbox');
                cb.checked = !cb.checked;
                const idx = parseInt(div.dataset.index);
                playersList[idx].selected = cb.checked;
                updateSelectedCount();
                saveToLocalStorage();
            });
        });
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const cnt = playersList.filter(p => p.selected).length;
        document.getElementById('selectedCountBadge').innerHTML = `выбрано: ${cnt}`;
    }

    function selectAll() { playersList.forEach(p => p.selected = true); renderPlayersGrid(); saveToLocalStorage(); }
    function deselectAll() { playersList.forEach(p => p.selected = false); renderPlayersGrid(); saveToLocalStorage(); }
    function saveSelection() { saveToLocalStorage(); const btn = document.getElementById('saveSelectionBtn'); const old = btn.innerText; btn.innerText = '✓ Сохранено!'; setTimeout(() => btn.innerText = old, 1200); }

    function getPlayerKey(nickname, style, weapon, belt) {
        return `${nickname}|${style}|${weapon}|${belt}`;
    }

    function compareAndMergeResults(oldResults, newResults) {
        const oldMap = new Map();
        oldResults.forEach(r => {
            oldMap.set(r.nickname, r);
        });
        
        const changedNicks = [];
        const finalResults = [];
        
        newResults.forEach(newR => {
            const oldR = oldMap.get(newR.nickname);
            if(!oldR) {
                changedNicks.push(newR.nickname);
                finalResults.push(newR);
            } else {
                const oldKey = getPlayerKey(oldR.nickname, oldR.style, oldR.weapon, oldR.belt);
                const newKey = getPlayerKey(newR.nickname, newR.style, newR.weapon, newR.belt);
                if(oldKey !== newKey) {
                    changedNicks.push(newR.nickname);
                }
                finalResults.push(newR);
            }
        });
        
        return { finalResults, changedNicks };
    }

    function renderTableWithHighlight(results, highlightNicks = []) {
        let html = `<table><thead>
            <tr>
                <th style="width:22%">👤 Ник</th>
                <th style="width:12%">🎨 Стиль</th>
                <th style="width:25%">⚔️ Оружие</th>
                <th style="width:41%">🎒 Пояс (предметы)</th>
            </tr>
        </thead><tbody>`;
        
        results.forEach(r => {
            const styleClass = (r.style === 'Урон' ? 'style-Урон' : r.style === 'Броня' ? 'style-Броня' : r.style === 'Уворот' ? 'style-Уворот' : r.style === 'Элита' ? 'style-Элита' : '');
            const hasAuraFlag = hasAura(r.belt);
            const rowClass = hasAuraFlag ? 'belt-highlight' : '';
            const isHighlighted = highlightNicks.includes(r.nickname);
            const highlightClass = isHighlighted ? 'highlight-change' : '';
            const beltFormatted = highlightItems(r.belt);
            html += `<tr class="${rowClass} ${highlightClass}">
                        <td><strong>${escapeHtml(r.nickname)}</strong></td>
                        <td class="${styleClass}">${r.style}</td>
                        <td>${escapeHtml(r.weapon)}</td>
                        <td>${beltFormatted}</td>
                    </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('resultsTable').innerHTML = html;
        document.getElementById('resultsCount').innerHTML = `${results.length} записей`;
        
        if(highlightNicks.length > 0) {
            setTimeout(() => {
                document.querySelectorAll('.highlight-change').forEach(row => {
                    row.classList.remove('highlight-change');
                });
            }, 3000);
        }
    }

    function applySortAndFilter() {
        let search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        let filtered = currentResults.filter(r => 
            r.nickname.toLowerCase().includes(search) ||
            r.weapon.toLowerCase().includes(search) ||
            r.belt.toLowerCase().includes(search) ||
            r.style.toLowerCase().includes(search)
        );
        
        if(currentSort.field === 'aura') {
            filtered.sort((a,b) => {
                let aAura = hasAura(a.belt) ? 1 : 0;
                let bAura = hasAura(b.belt) ? 1 : 0;
                return currentSort.asc ? bAura - aAura : aAura - bAura;
            });
        } else if(currentSort.field === 'style') {
            const order = { 'Элита':1, 'Урон':2, 'Уворот':3, 'Броня':4 };
            filtered.sort((a,b) => {
                let va = order[a.style] || 99, vb = order[b.style] || 99;
                return currentSort.asc ? va - vb : vb - va;
            });
        } else {
            filtered.sort((a,b) => {
                let va = (a[currentSort.field] || '').toLowerCase();
                let vb = (b[currentSort.field] || '').toLowerCase();
                if(va < vb) return currentSort.asc ? -1 : 1;
                if(va > vb) return currentSort.asc ? 1 : -1;
                return 0;
            });
        }
        renderTableWithHighlight(filtered, []);
    }

    function setupSorting() {
        document.querySelectorAll('.sort-chip').forEach(el => {
            el.addEventListener('click', () => {
                const field = el.dataset.sort;
                if(currentSort.field === field) currentSort.asc = !currentSort.asc;
                else { currentSort.field = field; currentSort.asc = (field === 'aura' ? false : true); }
                document.querySelectorAll('.sort-chip').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                applySortAndFilter();
            });
        });
    }

    function renderStats(stats, total) {
        const auraCount = stats.auras || 0;
        const weapons = [...stats.weapons.entries()].sort((a,b)=>b[1]-a[1]).slice(0,8);
        const items = [...stats.items.entries()].sort((a,b)=>b[1]-a[1]).slice(0,8);
        document.getElementById('statsDate').innerHTML = new Date().toLocaleString();
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="stat-number">${total}</div><div class="stat-label">Игроков</div></div>
            <div class="stat-card"><div class="stat-number">${Object.keys(stats.weapons).length}</div><div class="stat-label">Видов оружия</div></div>
            <div class="stat-card"><div class="stat-number">${stats.items.size}</div><div class="stat-label">Предметов на поясах</div></div>
            <div class="stat-card"><div class="stat-number" style="color:#d4603a;">${auraCount}</div><div class="stat-label">Аура death</div></div>
        `;
        
        let styleHtml = '', weaponHtml = '', itemHtml = '';
        for(let s of ['Элита','Урон','Уворот','Броня']) {
            let cnt = stats.styles[s]||0;
            styleHtml += `<div class="stat-row"><span>${s}</span><span class="stat-count">${cnt}</span></div>`;
        }
        weapons.forEach(([w,c]) => { weaponHtml += `<div class="stat-row"><span>${escapeHtml(w)}</span><span class="stat-count">${c}</span></div>`; });
        items.forEach(([it,c]) => {
            let name = it;
            if(it === 'Аура death') name = '<span style="color:#d4603a;">Аура death</span>';
            else if(it === 'Сила гор') name = '<span style="color:#e65c4a;">Сила гор</span>';
            else if(it === 'Сила Регенерации') name = '<span style="color:#f0da6a;">Сила Регенерации</span>';
            else if(it === 'Сила Тролля') name = '<span style="color:#7ac96e;">Сила Тролля</span>';
            else if(it === 'Сила Скорости') name = '<span style="color:#6ea8dc;">Сила Скорости</span>';
            else name = escapeHtml(it);
            itemHtml += `<div class="stat-row"><span>${name}</span><span class="stat-count">${c}</span></div>`;
        });
        document.getElementById('statsDetail').innerHTML = `
            <div class="stat-block"><h4>🎨 Стили</h4><div class="stat-list">${styleHtml}</div></div>
            <div class="stat-block"><h4>⚔️ Оружие</h4><div class="stat-list">${weaponHtml}</div></div>
            <div class="stat-block"><h4>🎒 Предметы (пояс)</h4><div class="stat-list">${itemHtml}</div></div>
        `;
    }

    async function parseAllPlayers(selected, showProgress = false, progressBar = null, progressText = null) {
        const stats = { styles: {}, weapons: new Map(), auras: 0, items: new Map() };
        const results = [];
        
        for(let i=0;i<selected.length;i++) {
            if(showProgress && progressBar && progressText) {
                const percent = ((i+1)/selected.length)*100;
                progressBar.style.width = `${percent}%`;
                progressText.innerText = `${selected[i].nick} (${i+1}/${selected.length})`;
            }
            const res = await parsePlayer(selected[i].nick, selected[i].id, stats);
            results.push(res);
            if(i < selected.length-1) await new Promise(r => setTimeout(r, 350));
        }
        
        return { results, stats, total: selected.length };
    }

    async function parsePlayer(nick, id, stats) {
        try {
            const proxyUrl = 'https://chkmb.duckdns.org/proxy.php?url=';
            const targetUrl = `https://mobitva.net/equipment.php?id=${id}`;
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            const html = await response.text();

            let weapon = 'не найдено', style = 'Неизвестно', belt = 'пустой';

            const weaponMatch = html.match(/Оружие:<\/td>.*?<td[^>]*>(?:<span[^>]*>)?(.*?)(?:<\/span>)?<\/td>/i);
            if(weaponMatch && weaponMatch[1]) {
                let raw = weaponMatch[1].replace(/<[^>]*>/g, '').trim();
                if(raw && raw !== '-' && raw !== '—') { weapon = raw; stats.weapons.set(weapon, (stats.weapons.get(weapon)||0)+1); }
            }

            const armorMatch = html.match(/Доспехи:<\/td>.*?color:(\w+)/i);
            if(armorMatch && armorMatch[1]) {
                const c = armorMatch[1].toLowerCase();
                if(c === 'green') style = 'Урон';
                else if(c === 'red') style = 'Броня';
                else if(c === 'blue') style = 'Уворот';
                else if(c === 'yellow') style = 'Элита';
                stats.styles[style] = (stats.styles[style]||0)+1;
            }

            const beltMatch = html.match(/Пояс:<\/td>.*?>(.*?)<\/td>/i);
            if(beltMatch && beltMatch[1]) {
                let raw = beltMatch[1].trim();
                if(raw !== '-' && raw !== '—') {
                    const items = [];
                    raw.split(',').forEach(part => {
                        let clean = part.replace(/\([^)]*\)/g, '').replace(/<[^>]*>/g, '').trim();
                        if(clean && clean !== '-') {
                            items.push(clean);
                            if(clean === 'Аура death') stats.auras++;
                            stats.items.set(clean, (stats.items.get(clean)||0)+1);
                        }
                    });
                    if(items.length) {
                        const countMap = new Map();
                        items.forEach(it => countMap.set(it, (countMap.get(it)||0)+1));
                        const parts = [];
                        for(let [it,cnt] of countMap) parts.push(cnt === 1 ? it : `${cnt} ${it}`);
                        belt = parts.join(', ');
                    }
                }
            }
            return { nickname: nick, style, weapon, belt };
        } catch(e) {
            console.error(`Ошибка ${nick}:`, e);
            return { nickname: nick, style: 'Ошибка', weapon: 'Ошибка', belt: 'Ошибка' };
        }
    }

    async function runParser() {
        if(isParsing) return;
        
        const selected = playersList.filter(p => p.selected);
        if(!selected.length) { alert('Выберите хотя бы одного персонажа'); return; }
        
        isParsing = true;
        const parseBtn = document.getElementById('parseBtn');
        parseBtn.disabled = true;
        parseBtn.innerText = '⏳ ПАРСИНГ...';
        
        document.getElementById('resultsArea').style.display = 'none';
        document.getElementById('statsArea').style.display = 'none';
        document.getElementById('progressArea').style.display = 'block';
        
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        
        const data = await parseAllPlayers(selected, true, progressBar, progressText);
        
        progressBar.style.width = '100%';
        progressText.innerText = `✅ Готово! ${data.total}/${data.total}`;
        setTimeout(() => document.getElementById('progressArea').style.display = 'none', 1000);
        
        currentResults = data.results;
        currentStats = data.stats;
        
        renderTableWithHighlight(data.results, []);
        renderStats(data.stats, data.total);
        
        document.getElementById('resultsArea').style.display = 'block';
        document.getElementById('statsArea').style.display = 'block';
        setupSorting();
        document.getElementById('searchInput').addEventListener('input', () => applySortAndFilter());
        
        isParsing = false;
        parseBtn.disabled = false;
        parseBtn.innerText = '🚀 ЗАПУСТИТЬ ПАРСИНГ';
        
        showToast(`Парсинг завершён! ${data.total} персонажей`, true);
    }

    async function autoRefresh() {
        if(!autoRefreshEnabled || isParsing) return;
        
        const selected = playersList.filter(p => p.selected);
        if(!selected.length) return;
        
        isParsing = true;
        showToast(`🔄 Автообновление...`, true);
        
        const data = await parseAllPlayers(selected, false, null, null);
        
        if(data.results && data.results.length > 0) {
            const { finalResults, changedNicks } = compareAndMergeResults(currentResults, data.results);
            
            if(changedNicks.length > 0) {
                currentResults = finalResults;
                currentStats = data.stats;
                renderTableWithHighlight(finalResults, changedNicks);
                renderStats(data.stats, data.total);
                showToast(`📡 Обновлено! ${changedNicks.length} изменений`, true);
            } else {
                showToast(`✅ Нет изменений`, true);
            }
        }
        
        isParsing = false;
        
        if(autoRefreshEnabled) {
            restartCountdown();
        }
    }

    function startCountdown(seconds) {
        if(countdownInterval) clearInterval(countdownInterval);
        
        let remaining = seconds;
        const countdownEl = document.getElementById('countdown');
        
        countdownInterval = setInterval(() => {
            if(!autoRefreshEnabled) {
                if(countdownEl) countdownEl.innerText = '--';
                return;
            }
            if(remaining <= 0) {
                if(countdownEl) countdownEl.innerText = '0';
            } else {
                remaining--;
                if(countdownEl) countdownEl.innerText = remaining;
            }
        }, 1000);
    }

    function restartCountdown() {
        if(autoRefreshTimer) clearInterval(autoRefreshTimer);
        
        const intervalSec = parseInt(document.getElementById('refreshInterval').value) || 30;
        startCountdown(intervalSec);
        
        autoRefreshTimer = setInterval(() => {
            if(autoRefreshEnabled && !isParsing) {
                autoRefresh();
            }
        }, intervalSec * 1000);
    }

    function stopAutoRefresh() {
        if(autoRefreshTimer) {
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
        }
        if(countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
        document.getElementById('autoStatus').style.display = 'none';
    }

    function enableAutoRefresh() {
        autoRefreshEnabled = true;
        restartCountdown();
        document.getElementById('autoStatus').style.display = 'flex';
        showToast(`Автообновление включено (${document.getElementById('refreshInterval').value} сек)`, true);
    }

    function disableAutoRefresh() {
        autoRefreshEnabled = false;
        stopAutoRefresh();
        showToast(`Автообновление выключено`, false);
    }

    function setupAutoRefresh() {
        const toggle = document.getElementById('autoRefreshToggle');
        const intervalInput = document.getElementById('refreshInterval');
        
        toggle.addEventListener('change', () => {
            if(toggle.checked) {
                enableAutoRefresh();
            } else {
                disableAutoRefresh();
            }
        });
        
        intervalInput.addEventListener('change', () => {
            let val = parseInt(intervalInput.value);
            if(val < 10) intervalInput.value = 10;
            if(val > 300) intervalInput.value = 300;
            
            if(autoRefreshEnabled) {
                stopAutoRefresh();
                restartCountdown();
                showToast(`Интервал изменён на ${intervalInput.value} сек`, true);
            }
        });
    }

    document.getElementById('selectAllBtn').onclick = selectAll;
    document.getElementById('deselectAllBtn').onclick = deselectAll;
    document.getElementById('saveSelectionBtn').onclick = saveSelection;
    document.getElementById('parseBtn').onclick = runParser;

    initDefaultPlayers();
    loadFromLocalStorage();
    setupAutoRefresh();
    
    const savedAutoState = localStorage.getItem('mobitva_auto_refresh');
    if(savedAutoState === 'enabled') {
        document.getElementById('autoRefreshToggle').checked = true;
        enableAutoRefresh();
    }
    
    setInterval(() => {
        localStorage.setItem('mobitva_auto_refresh', autoRefreshEnabled ? 'enabled' : 'disabled');
    }, 1000);
</script>
