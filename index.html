<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitva Parser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #00ff00;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #ffff00;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .controls {
            background: #1a1e2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #00ff00;
        }
        
        .section {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #ffff00;
            font-weight: bold;
        }
        
        textarea {
            width: 100%;
            padding: 10px;
            background: #0a0e1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 4px;
        }
        
        textarea {
            height: 200px;
            font-size: 12px;
        }
        
        button {
            background: #00ff00;
            color: #0a0e1a;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-right: 10px;
            font-size: 14px;
        }
        
        button:hover {
            background: #00cc00;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .checkbox-group {
            background: #0a0e1a;
            border: 1px solid #00ff00;
            border-radius: 4px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 10px;
        }
        
        .checkbox-item {
            margin: 5px 0;
            padding: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        .checkbox-item:hover {
            background: #1a1e2a;
        }
        
        .checkbox-item input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            color: #00ff00;
            font-weight: normal;
        }
        
        .select-buttons {
            margin-bottom: 10px;
        }
        
        .select-buttons button {
            padding: 5px 10px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .progress {
            background: #1a1e2a;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        
        .results {
            background: #1a1e2a;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            display: none;
        }
        
        .stats {
            background: #1a1e2a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th, td {
            border: 1px solid #00ff00;
            padding: 8px;
            text-align: left;
        }
        
        th {
            background: #00ff00;
            color: #0a0e1a;
            font-weight: bold;
        }
        
        .status {
            color: #ffff00;
            margin-top: 10px;
            font-size: 12px;
        }
        
        .stat-item {
            margin: 10px 0;
            font-size: 14px;
        }
        
        .stat-label {
            color: #ffff00;
            font-weight: bold;
        }
        
        .auras {
            color: #ff44ff;
        }
        
        .save-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #00ff00;
            color: #0a0e1a;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 MOBITVA PARSER v3.1</h1>
        
        <div class="controls">
            <div class="section">
                <label>👥 СПИСОК ПЕРСОНАЖЕЙ (ник|id)</label>
                <textarea id="players" placeholder="Aruta|500
𝓑𝓐𝓡𝓜𝓐𝓛𝓔𝓨|147
FREEMAN|372
KROP|166
GiBRiDiK|235
ᙖᗝᙁᗯᙓᘜᕼᕠᕫ|137
Макаров|298
PeRvoRoDNi|350"></textarea>
                <div class="status">📝 Формат: ник|id (каждый персонаж с новой строки)</div>
            </div>
            
            <div class="section">
                <label>✅ ВЫБЕРИ ПЕРСОНАЖЕЙ ДЛЯ ПАРСИНГА</label>
                <div class="select-buttons">
                    <button id="selectAllBtn">✅ ВЫБРАТЬ ВСЕХ</button>
                    <button id="deselectAllBtn">❌ СНЯТЬ ВСЕХ</button>
                    <button id="loadPlayersBtn">🔄 ЗАГРУЗИТЬ ИЗ СПИСКА</button>
                    <button id="saveSelectionBtn">💾 СОХРАНИТЬ ВЫБОР</button>
                </div>
                <div id="checkboxList" class="checkbox-group">
                    <div style="color: #666; text-align: center;">Нажми "Загрузить из списка"</div>
                </div>
                <div class="status" id="selectedCount">📊 Выбрано: 0 персонажей</div>
            </div>
            
            <div class="section">
                <button id="parseBtn" disabled>🚀 ЗАПУСТИТЬ ПАРСИНГ</button>
                <button id="clearBtn">🗑️ ОЧИСТИТЬ РЕЗУЛЬТАТЫ</button>
            </div>
        </div>
        
        <div id="progress" class="progress">
            <div>📊 ПРОГРЕСС: <span id="progressText">0/0</span></div>
            <div>👤 СЕЙЧАС: <span id="currentPlayer">-</span></div>
        </div>
        
        <div id="results" class="results">
            <h2>📋 РЕЗУЛЬТАТЫ ПАРСИНГА</h2>
            <div id="resultsTable"></div>
        </div>
        
        <div id="stats" class="stats">
            <h2>📊 ФИНАЛЬНАЯ СТАТИСТИКА</h2>
            <div id="statsContent"></div>
        </div>
    </div>
    
    <div id="saveStatus" class="save-status">💾 Выбор сохранен!</div>
    
    <script>
        let playersList = [];
        let isParsing = false;
        
        function showSaveStatus() {
            const status = document.getElementById('saveStatus');
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 2000);
        }
        
        function saveSelectionToLocalStorage() {
            const selectionData = playersList.map(p => ({
                nick: p.nick,
                id: p.id,
                selected: p.selected
            }));
            localStorage.setItem('mobitva_selection', JSON.stringify(selectionData));
            showSaveStatus();
        }
        
        function loadSelectionFromLocalStorage() {
            const saved = localStorage.getItem('mobitva_selection');
            if (saved) {
                try {
                    const savedData = JSON.parse(saved);
                    for (let savedPlayer of savedData) {
                        const found = playersList.find(p => p.id === savedPlayer.id && p.nick === savedPlayer.nick);
                        if (found) {
                            found.selected = savedPlayer.selected;
                        }
                    }
                    renderCheckboxList();
                } catch(e) {
                    console.error('Ошибка загрузки сохранений:', e);
                }
            }
        }
        
        function loadPlayersFromText() {
            const text = document.getElementById('players').value;
            const lines = text.split('\n');
            const newPlayers = [];
            
            for (let line of lines) {
                line = line.trim();
                if (line) {
                    const parts = line.split('|');
                    if (parts.length === 2) {
                        newPlayers.push({
                            nick: parts[0].trim(),
                            id: parseInt(parts[1].trim()),
                            selected: true
                        });
                    }
                }
            }
            
            if (newPlayers.length > 0) {
                playersList = newPlayers;
                loadSelectionFromLocalStorage();
                renderCheckboxList();
                document.getElementById('parseBtn').disabled = false;
            } else {
                alert('Нет валидных персонажей! Формат: ник|id');
            }
        }
        
        function renderCheckboxList() {
            const container = document.getElementById('checkboxList');
            let html = '';
            
            for (let i = 0; i < playersList.length; i++) {
                const player = playersList[i];
                html += `
                    <div class="checkbox-item">
                        <input type="checkbox" id="player_${i}" data-index="${i}" ${player.selected ? 'checked' : ''}>
                        <label for="player_${i}">
                            ${player.nick} | ID: ${player.id}
                        </label>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            
            const checkboxes = document.querySelectorAll('#checkboxList input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const index = parseInt(this.getAttribute('data-index'));
                    playersList[index].selected = this.checked;
                    updateSelectedCount();
                });
            });
            
            updateSelectedCount();
        }
        
        function updateSelectedCount() {
            const selected = playersList.filter(p => p.selected).length;
            document.getElementById('selectedCount').innerHTML = `📊 Выбрано: ${selected} из ${playersList.length} персонажей`;
        }
        
        function selectAll() {
            playersList.forEach(p => p.selected = true);
            renderCheckboxList();
        }
        
        function deselectAll() {
            playersList.forEach(p => p.selected = false);
            renderCheckboxList();
        }
        
        function parseBelt(beltHtml, stats) {
            if (!beltHtml || beltHtml === '-' || beltHtml.trim() === '-') {
                return 'пустой';
            }
            
            function cleanItemName(rawText) {
                let cleaned = rawText.replace(/\([^)]*\)/g, '');
                cleaned = cleaned.replace(/<[^>]*>/g, '');
                cleaned = cleaned.trim();
                return cleaned;
            }
            
            const items = [];
            const parts = beltHtml.split(',');
            
            for (let part of parts) {
                let clean = cleanItemName(part);
                if (clean && clean !== '-' && clean !== '') {
                    items.push(clean);
                }
            }
            
            if (items.length === 0) return 'пустой';
            
            for (let item of items) {
                if (item === 'Аура death') {
                    stats.auras++;
                }
            }
            
            const countMap = new Map();
            for (let item of items) {
                countMap.set(item, (countMap.get(item) || 0) + 1);
            }
            
            const result = [];
            for (let [item, count] of countMap) {
                if (count === 1) {
                    result.push(item);
                } else {
                    result.push(`${count} ${item}`);
                }
            }
            
            return result.join(', ');
        }
        
        function getStyleFromColor(color) {
            const colorMap = {
                'green': 'Урон',
                'red': 'Броня',
                'blue': 'Уворот',
                'yellow': 'Элита'
            };
            return colorMap[color] || 'Неизвестно';
        }
        
        function getStyleColor(style) {
            const colors = {
                'Урон': '#00ff00',
                'Броня': '#ff4444',
                'Уворот': '#4488ff',
                'Элита': '#ffff44'
            };
            return colors[style] || '#ffffff';
        }
        
        async function parsePlayer(nickname, playerId, stats) {
            const url = `https://mobitva.net/equipment.php?id=${playerId}`;
            
            try {
                const response = await fetch(url);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                let weapon = null;
                let style = null;
                let belt = null;
                
                const rows = doc.querySelectorAll('tr');
                
                for (let row of rows) {
                    const labelCell = row.querySelector('td.label');
                    if (!labelCell) continue;
                    
                    const labelText = labelCell.textContent.trim();
                    
                    if (labelText === 'Оружие:') {
                        const valueCell = row.querySelector('td:last-child');
                        if (valueCell) {
                            weapon = valueCell.textContent.trim().replace(/\s+/g, ' ').trim();
                            if (weapon && weapon !== 'не найдено') {
                                stats.weapons.set(weapon, (stats.weapons.get(weapon) || 0) + 1);
                            }
                        }
                    }
                    
                    if (labelText === 'Доспехи:') {
                        const valueCell = row.querySelector('td:last-child');
                        if (valueCell) {
                            const colorSpan = valueCell.querySelector('span');
                            if (colorSpan) {
                                const color = colorSpan.getAttribute('style');
                                if (color) {
                                    if (color.includes('green')) style = getStyleFromColor('green');
                                    else if (color.includes('red')) style = getStyleFromColor('red');
                                    else if (color.includes('blue')) style = getStyleFromColor('blue');
                                    else if (color.includes('yellow')) style = getStyleFromColor('yellow');
                                    else style = 'Неизвестно';
                                    
                                    if (stats.styles[style] !== undefined) {
                                        stats.styles[style]++;
                                    } else {
                                        stats.styles['Неизвестно']++;
                                    }
                                }
                            }
                        }
                    }
                    
                    if (labelText === 'Пояс:') {
                        const valueCell = row.querySelector('td:last-child');
                        if (valueCell) {
                            const beltHtml = valueCell.innerHTML;
                            belt = parseBelt(beltHtml, stats);
                        }
                    }
                }
                
                if (!weapon) weapon = 'не найдено';
                if (!style) style = 'Неизвестно';
                
                return { nickname, style, weapon, belt, success: true };
                
            } catch (error) {
                return { nickname, style: 'Ошибка', weapon: 'Ошибка', belt: 'Ошибка', success: false };
            }
        }
        
        async function runParser() {
            if (isParsing) return;
            
            const selectedPlayers = playersList.filter(p => p.selected);
            
            if (selectedPlayers.length === 0) {
                alert('Выберите хотя бы одного персонажа!');
                return;
            }
            
            isParsing = true;
            document.getElementById('parseBtn').disabled = true;
            document.getElementById('results').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('progress').style.display = 'block';
            
            const stats = {
                styles: { Урон: 0, Броня: 0, Уворот: 0, Элита: 0, Неизвестно: 0 },
                weapons: new Map(),
                auras: 0
            };
            
            const results = [];
            const total = selectedPlayers.length;
            
            for (let i = 0; i < total; i++) {
                const player = selectedPlayers[i];
                document.getElementById('progressText').innerText = `${i}/${total}`;
                document.getElementById('currentPlayer').innerText = player.nick;
                
                const result = await parsePlayer(player.nick, player.id, stats);
                results.push(result);
                
                if (i < total - 1) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }
            
            document.getElementById('progress').style.display = 'none';
            
            let resultsHtml = '<table><tr><th>Ник</th><th>Стиль</th><th>Оружие</th><th>Пояс</th></tr>';
            for (let result of results) {
                const color = getStyleColor(result.style);
                resultsHtml += `<tr style="color: ${color}">
                    <td>${result.nickname}</td>
                    <td>${result.style}</td>
                    <td>${result.weapon}</td>
                    <td>${result.belt}</td>
                </tr>`;
            }
            resultsHtml += '</table>';
            document.getElementById('resultsTable').innerHTML = resultsHtml;
            document.getElementById('results').style.display = 'block';
            
            let statsHtml = '';
            
            statsHtml += '<div class="stat-item"><span class="stat-label">🎨 СТИЛИ:</span></div>';
            for (let [style, count] of Object.entries(stats.styles)) {
                if (count > 0) {
                    const color = getStyleColor(style);
                    statsHtml += `<div class="stat-item" style="color: ${color}; margin-left: 20px;">${style}: ${count}</div>`;
                }
            }
            
            statsHtml += '<div class="stat-item"><span class="stat-label">⚔️ ОРУЖИЕ:</span></div>';
            const sortedWeapons = Array.from(stats.weapons.entries()).sort((a, b) => b[1] - a[1]);
            for (let [weapon, count] of sortedWeapons) {
                statsHtml += `<div class="stat-item" style="margin-left: 20px;">${count} x ${weapon}</div>`;
            }
            
            statsHtml += `<div class="stat-item"><span class="stat-label">✨ АУРЫ:</span></div>`;
            statsHtml += `<div class="stat-item auras" style="margin-left: 20px;">Аура death: ${stats.auras}</div>`;
            
            document.getElementById('statsContent').innerHTML = statsHtml;
            document.getElementById('stats').style.display = 'block';
            
            isParsing = false;
            document.getElementById('parseBtn').disabled = false;
        }
        
        function clearResults() {
            document.getElementById('results').style.display = 'none';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('progress').style.display = 'none';
        }
        
        document.getElementById('loadPlayersBtn').addEventListener('click', loadPlayersFromText);
        document.getElementById('selectAllBtn').addEventListener('click', selectAll);
        document.getElementById('deselectAllBtn').addEventListener('click', deselectAll);
        document.getElementById('saveSelectionBtn').addEventListener('click', saveSelectionToLocalStorage);
        document.getElementById('parseBtn').addEventListener('click', runParser);
        document.getElementById('clearBtn').addEventListener('click', clearResults);
        
        if (playersList.length === 0) {
            const defaultText = document.getElementById('players').value;
            const lines = defaultText.split('\n');
            for (let line of lines) {
                line = line.trim();
                if (line) {
                    const parts = line.split('|');
                    if (parts.length === 2) {
                        playersList.push({
                            nick: parts[0].trim(),
                            id: parseInt(parts[1].trim()),
                            selected: true
                        });
                    }
                }
            }
            loadSelectionFromLocalStorage();
            renderCheckboxList();
            if (playersList.length > 0) {
                document.getElementById('parseBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
