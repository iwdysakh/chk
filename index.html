<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobitva Parser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; background: #1a1a2e; color: #eee; padding: 16px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        h1 { font-size: 22px; margin-bottom: 16px; color: #fff; }
        h2 { font-size: 18px; margin-bottom: 12px; color: #ccc; }
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; max-height: 350px; overflow-y: auto; padding: 4px; }
        .player-item { background: #0f3460; border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .player-item:hover { background: #1a4a7a; }
        .player-item input { width: 18px; height: 18px; cursor: pointer; margin: 0; pointer-events: none; }
        .player-item label { flex: 1; cursor: pointer; font-size: 14px; pointer-events: none; }
        .button-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        button { background: #e94560; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        button:hover { opacity: 0.85; }
        button.primary { background: #0f3460; }
        .progress-bar-container { background: #2d2d44; border-radius: 20px; height: 20px; overflow: hidden; margin: 10px 0; }
        .progress-bar { background: #e94560; height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 12px; color: #aaa; margin-top: 5px; text-align: center; }
        .results-table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #2d2d44; padding: 8px 6px; text-align: left; }
        th { background: #0f3460; color: #e94560; }
        tr:hover { background: #1a1a3e; }
        .style-Урон { color: #4ade80; font-weight: 500; }
        .style-Броня { color: #f87171; font-weight: 500; }
        .style-Уворот { color: #60a5fa; font-weight: 500; }
        .style-Элита { color: #facc15; font-weight: 500; }
        .error-text { color: #f87171; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .stat-block { background: #0f3460; border-radius: 8px; padding: 12px; }
        .stat-block h3 { font-size: 13px; margin-bottom: 8px; color: #e94560; }
        .stat-list { font-size: 12px; line-height: 1.6; max-height: 150px; overflow-y: auto; }
        .stat-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2d2d44; }
        .auras-count { font-size: 20px; font-weight: bold; color: #c084fc; text-align: center; padding: 10px; }
        .status { font-size: 12px; color: #aaa; margin-top: 8px; text-align: center; }
        @media (max-width: 600px) {
            body { padding: 12px; }
            .card { padding: 12px; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .player-item label { font-size: 12px; }
            button { padding: 6px 12px; font-size: 12px; }
            th, td { font-size: 10px; padding: 6px 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎯 MOBITVA PARSER</h1>
            <div class="status" style="color: #4ade80;">✅ Работает через прокси</div>
        </div>

        <div class="card">
            <div class="button-group">
                <button id="selectAllBtn">✅ Выбрать всех</button>
                <button id="deselectAllBtn">❌ Снять всех</button>
                <button id="saveSelectionBtn">💾 Сохранить выбор</button>
            </div>
            <div id="playersGrid" class="players-grid"></div>
            <div class="status" id="selectedCount"></div>
        </div>

        <div class="card">
            <button id="parseBtn" class="primary">🚀 ЗАПУСТИТЬ ПАРСИНГ</button>
            <div id="progressArea" style="display: none;">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">0/0</div>
            </div>
        </div>

        <div id="resultsArea" class="card" style="display: none;">
            <h2>📋 РЕЗУЛЬТАТЫ</h2>
            <div class="results-table-wrapper">
                <div id="resultsTable"></div>
            </div>
        </div>

        <div id="statsArea" class="card" style="display: none;">
            <h2>📊 СТАТИСТИКА</h2>
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        let playersList = [];
        let isParsing = false;

        const DEFAULT_PLAYERS = [
            "Aruta|500",
            "𝓑𝓐𝓡𝓜𝓐𝓛𝓔𝓨|147",
            "FREEMAN|372",
            "KROP|166",
            "GiBRiDiK|235",
            "ᙖᗝᙁᗯᙓᘜᕼᕠᕫ|137",
            "Макаров|298",
            "PeRvoRoDNi|350"
        ];

        function saveToLocalStorage() {
            localStorage.setItem('mobitva_players', JSON.stringify(playersList.map(p => ({ nick: p.nick, id: p.id, selected: p.selected }))));
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('mobitva_players');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed.length) {
                        playersList = parsed;
                        renderPlayersGrid();
                        return true;
                    }
                } catch(e) {}
            }
            return false;
        }

        function initDefaultPlayers() {
            playersList = [];
            for (let line of DEFAULT_PLAYERS) {
                const parts = line.split('|');
                if (parts.length === 2) {
                    playersList.push({
                        nick: parts[0].trim(),
                        id: parseInt(parts[1].trim()),
                        selected: true
                    });
                }
            }
            renderPlayersGrid();
        }

        function renderPlayersGrid() {
            const container = document.getElementById('playersGrid');
            let html = '';
            for (let i = 0; i < playersList.length; i++) {
                const p = playersList[i];
                html += `<div class="player-item" data-index="${i}">
                            <input type="checkbox" class="player-checkbox" id="chk_${i}" ${p.selected ? 'checked' : ''}>
                            <label for="chk_${i}">${p.nick}</label>
                        </div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.player-item').forEach(div => {
                div.addEventListener('click', function() {
                    const cb = this.querySelector('.player-checkbox');
                    cb.checked = !cb.checked;
                    const idx = parseInt(this.getAttribute('data-index'));
                    playersList[idx].selected = cb.checked;
                    updateSelectedCount();
                    saveToLocalStorage();
                });
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const selected = playersList.filter(p => p.selected).length;
            document.getElementById('selectedCount').innerHTML = `📊 Выбрано: ${selected} из ${playersList.length}`;
        }

        function selectAll() {
            playersList.forEach(p => p.selected = true);
            renderPlayersGrid();
            saveToLocalStorage();
        }

        function deselectAll() {
            playersList.forEach(p => p.selected = false);
            renderPlayersGrid();
            saveToLocalStorage();
        }

        function saveSelection() {
            saveToLocalStorage();
            const btn = document.getElementById('saveSelectionBtn');
            const originalText = btn.innerText;
            btn.innerText = '✓ Сохранено!';
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        function parseBelt(beltText, stats) {
            if (!beltText || beltText === '-' || beltText.trim() === '-') return 'пустой';
            
            const items = [];
            const parts = beltText.split(',');
            for (let part of parts) {
                let clean = part.replace(/\([^)]*\)/g, '').replace(/<[^>]*>/g, '').trim();
                if (clean && clean !== '-' && clean !== '—') {
                    items.push(clean);
                    if (clean === 'Аура death') stats.auras++;
                }
            }
            
            if (items.length === 0) return 'пустой';
            
            const countMap = new Map();
            for (let item of items) countMap.set(item, (countMap.get(item) || 0) + 1);
            
            const result = [];
            for (let [item, cnt] of countMap) result.push(cnt === 1 ? item : `${cnt} ${item}`);
            return result.join(', ');
        }

        function getStyleByColor(color) {
            if (color === 'green') return 'Урон';
            if (color === 'red') return 'Броня';
            if (color === 'blue') return 'Уворот';
            if (color === 'yellow') return 'Элита';
            return 'Неизвестно';
        }

        async function parsePlayer(nick, id, stats) {
            try {
                const proxyUrl = 'http://136.244.71.214/proxy.php?url=';
                const targetUrl = `https://mobitva.net/equipment.php?id=${id}`;
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
                const html = await response.text();
                
                let weapon = 'не найдено';
                let style = 'Неизвестно';
                let belt = 'пустой';
                
                // Парсим оружие
                const weaponMatch = html.match(/Оружие:<\/td>.*?<span[^>]*>(.*?)<\/span>/i);
                if (weaponMatch && weaponMatch[1]) {
                    weapon = weaponMatch[1].trim();
                    if (weapon && weapon !== '-' && weapon !== '—') {
                        stats.weapons.set(weapon, (stats.weapons.get(weapon) || 0) + 1);
                    }
                }
                
                // Парсим стиль по цвету доспехов
                const armorMatch = html.match(/Доспехи:<\/td>.*?color:(\w+)/i);
                if (armorMatch && armorMatch[1]) {
                    style = getStyleByColor(armorMatch[1].toLowerCase());
                    stats.styles[style] = (stats.styles[style] || 0) + 1;
                }
                
                // Парсим пояс
                const beltMatch = html.match(/Пояс:<\/td>.*?>(.*?)<\/td>/i);
                if (beltMatch && beltMatch[1]) {
                    let beltRaw = beltMatch[1].trim();
                    if (beltRaw !== '-' && beltRaw !== '—') {
                        belt = parseBelt(beltRaw, stats);
                    }
                }
                
                return { nickname: nick, style, weapon, belt };
            } catch(e) {
                console.error(`Ошибка ${nick}:`, e);
                return { nickname: nick, style: 'Ошибка', weapon: 'Ошибка', belt: 'Ошибка' };
            }
        }

        async function runParser() {
            if (isParsing) return;
            const selected = playersList.filter(p => p.selected);
            if (!selected.length) { alert('Выберите хотя бы одного персонажа'); return; }
            
            isParsing = true;
            const parseBtn = document.getElementById('parseBtn');
            parseBtn.disabled = true;
            parseBtn.innerText = '⏳ ПАРСИНГ...';
            
            document.getElementById('resultsArea').style.display = 'none';
            document.getElementById('statsArea').style.display = 'none';
            document.getElementById('progressArea').style.display = 'block';
            
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            
            const stats = { styles: {}, weapons: new Map(), auras: 0 };
            const results = [];
            
            for (let i = 0; i < selected.length; i++) {
                const percent = ((i + 1) / selected.length) * 100;
                progressBar.style.width = `${percent}%`;
                progressText.innerText = `${i + 1} / ${selected.length} - ${selected[i].nick}`;
                
                const result = await parsePlayer(selected[i].nick, selected[i].id, stats);
                results.push(result);
                
                if (i < selected.length - 1) await new Promise(r => setTimeout(r, 500));
            }
            
            progressBar.style.width = '100%';
            progressText.innerText = `✅ Готово! ${selected.length}/${selected.length}`;
            setTimeout(() => document.getElementById('progressArea').style.display = 'none', 1000);
            
            let tableHtml = '<table><thead><tr><th>Ник</th><th>Стиль</th><th>Оружие</th><th>Пояс</th></tr></thead><tbody>';
            for (let r of results) {
                let styleClass = '';
                if (r.style === 'Урон') styleClass = 'style-Урон';
                else if (r.style === 'Броня') styleClass = 'style-Броня';
                else if (r.style === 'Уворот') styleClass = 'style-Уворот';
                else if (r.style === 'Элита') styleClass = 'style-Элита';
                else if (r.style === 'Ошибка') styleClass = 'error-text';
                
                tableHtml += `<tr>
                    <td>${r.nickname}</td>
                    <td class="${styleClass}">${r.style}</td>
                    <td>${r.weapon}</td>
                    <td>${r.belt}</td>
                </tr>`;
            }
            tableHtml += '</tbody></table>';
            document.getElementById('resultsTable').innerHTML = tableHtml;
            document.getElementById('resultsArea').style.display = 'block';
            
            let statsHtml = '<div class="stats-grid">';
            statsHtml += '<div class="stat-block"><h3>🎨 СТИЛИ</h3><div class="stat-list">';
            for (let [s, c] of Object.entries(stats.styles)) {
                let styleClass = '';
                if (s === 'Урон') styleClass = 'style-Урон';
                else if (s === 'Броня') styleClass = 'style-Броня';
                else if (s === 'Уворот') styleClass = 'style-Уворот';
                else if (s === 'Элита') styleClass = 'style-Элита';
                statsHtml += `<div class="stat-item"><span class="${styleClass}">${s}</span><span>${c}</span></div>`;
            }
            statsHtml += '</div></div>';
            
            statsHtml += '<div class="stat-block"><h3>⚔️ ОРУЖИЕ</h3><div class="stat-list">';
            const sortedWeapons = [...stats.weapons.entries()].sort((a,b) => b[1] - a[1]);
            for (let [w, c] of sortedWeapons.slice(0, 15)) {
                statsHtml += `<div class="stat-item"><span>${w}</span><span>${c} шт</span></div>`;
            }
            if (sortedWeapons.length > 15) statsHtml += `<div class="stat-item"><span>...</span><span>+${sortedWeapons.length - 15}</span></div>`;
            statsHtml += '</div></div>';
            
            statsHtml += '<div class="stat-block"><h3>✨ АУРЫ</h3><div class="auras-count">Аура death: ' + stats.auras + '</div></div></div>';
            document.getElementById('statsContent').innerHTML = statsHtml;
            document.getElementById('statsArea').style.display = 'block';
            
            isParsing = false;
            parseBtn.disabled = false;
            parseBtn.innerText = '🚀 ЗАПУСТИТЬ ПАРСИНГ';
        }

        document.getElementById('selectAllBtn').onclick = selectAll;
        document.getElementById('deselectAllBtn').onclick = deselectAll;
        document.getElementById('saveSelectionBtn').onclick = saveSelection;
        document.getElementById('parseBtn').onclick = runParser;

        if (!loadFromLocalStorage()) {
            initDefaultPlayers();
        }
    </script>
</body>
</html>
